/* === TOP BAR === */
.topbar{
  position:fixed;top:0;left:0;right:0;width:100%;z-index:999;
  background:linear-gradient(160deg,#071C10 0%,#0D4F2E 35%,#166534 65%,#071C10 100%);
  height:auto;min-height:90px;padding-top:8px;padding-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  box-shadow:0 4px 20px rgba(0,0,0,.45);
  border-bottom:3px solid #E9C46A;
  transform:translateZ(0);-webkit-transform:translateZ(0)
}
.topbar-left{display:none}
.topbar-logo{
  width:clamp(38px,7vw,52px);height:clamp(38px,7vw,52px);
  border-radius:50%;object-fit:cover;
  border:2.5px solid #E9C46A;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  background:#fff;flex-shrink:0
}
.topbar-center{display:none}
.topbar-name-fr{font-family:'Playfair Display',Georgia,serif;
  font-family:'Playfair Display',serif;
  font-size:clamp(16px,5vw,36px);
  font-weight:900;color:#FFFFFF;
  letter-spacing:.5px;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
  line-height:1.15;
  max-width:100%;word-break:keep-all
}
.topbar-name-ar{font-family:'Scheherazade New','Amiri',serif;
  font-family:'Amiri',serif;
  font-size:clamp(20px,6vw,44px);
  font-weight:700;color:#FFFFFF;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
  line-height:1.2;
  display:none;max-width:100%
}
[dir=rtl] .topbar-name-fr{font-family:'Playfair Display',Georgia,serif;display:none}
[dir=rtl] .topbar-name-ar{font-family:'Scheherazade New','Amiri',serif;display:block}
.topbar-year{
  font-size:clamp(10px,2vw,14px);
  font-weight:800;color:#E9C46A;
  letter-spacing:clamp(1px,.5vw,3px);
  margin-top:2px;white-space:nowrap
}
.topbar-date{
  font-size:clamp(9px,1.6vw,12px);
  font-weight:600;
  color:rgba(255,255,255,.65);
  margin-top:1px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.3px
}
.topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.app-name{display:none}
.lang-sw{display:flex;background:rgba(255,255,255,.15);border-radius:22px;padding:3px;gap:2px}
.lbtn{
  padding:clamp(3px,.6vw,6px) clamp(8px,1.5vw,16px);
  border-radius:19px;font-size:clamp(11px,1.8vw,14px);
  font-weight:700;border:none;cursor:pointer;
  color:rgba(255,255,255,.75);background:transparent;
  font-family:inherit;transition:all .2s
}
.lbtn.on{background:#fff;color:#145A32;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.lang-sw{display:flex;background:rgba(255,255,255,.15);border-radius:22px;padding:3px;gap:2px}
.lbtn{padding:clamp(3px,.6vw,7px) clamp(8px,1.5vw,18px);border-radius:19px;font-size:clamp(11px,1.8vw,14px);font-weight:700;border:none;cursor:pointer;color:rgba(255,255,255,.75);background:transparent;font-family:inherit;transition:all .2s}
.lbtn.on{background:#fff;color:#145A32;box-shadow:0 1px 4px rgba(0,0,0,.2)}


/* === BOTTOM NAV === */
.botnav{position:fixed;bottom:0;left:0;right:0;width:100%;z-index:999;background:#fff;border-top:2px solid var(--cr2);display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.1);transform:translateZ(0);-webkit-transform:translateZ(0)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;border:none;background:transparent;color:var(--ink3);font-size:11px;font-weight:700;gap:3px;transition:color .15s;font-family:inherit}
.bni.on{color:var(--em)}
.bni.on .bni-ic{transform:scale(1.1)}
.bni-ic{font-size:22px;line-height:1;transition:transform .15s}

/* === MORE MENU === */
.more-menu{display:none;position:fixed;bottom:68px;right:10px;z-index:1000;background:#fff;border-radius:var(--ra);box-shadow:var(--sh2);overflow:hidden;min-width:200px;border:1px solid var(--bd)}
.more-menu.show{display:block}
.mmi{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;font-size:15px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--cr2)}
.mmi:last-child{border-bottom:none}
.mmi:active{background:var(--cr2)}
.mmi.on{color:var(--em);background:var(--em3)}
.mm-ic{font-size:20px;width:26px;text-align:center}

/* === PAGE === */
.page{padding:8px 8px 90px;overflow-x:hidden;width:100%;max-width:100vw}

/* === DASHBOARD HEADER === */


/* === STAT GRID === */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;width:100%;box-sizing:border-box}
.sc{background:#fff;border-radius:var(--ra);padding:16px 14px;box-shadow:var(--sh);border:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.sc-ic{font-size:26px;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic1{background:#DCF5E7}.ic2{background:#FFF3D1}.ic3{background:#FFE9E0}.ic4{background:#D1F2EB}
.sc-v{font-size:clamp(20px,5vw,28px);font-weight:900;color:var(--ink);line-height:1}
.sc-l{font-size:12px;color:var(--ink3);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

/* === CARDS === */
.card{background:#fff;border-radius:var(--ra);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;border:1px solid var(--bd)}
.ch{padding:14px 16px;border-bottom:2px solid var(--cr2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--cr)}
.ct{font-size:17px;font-weight:900;color:var(--em);letter-spacing:.2px}
.ca{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.srch{border:2px solid var(--bd);border-radius:var(--rs);padding:9px 13px;font-size:14px;color:var(--ink);outline:none;background:#fff;width:160px;font-family:inherit;font-weight:500}
.srch:focus{border-color:var(--em)}

/* === BUTTONS === */
.btn{padding:12px 20px;border-radius:var(--rs);font-size:14px;font-weight:800;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;font-family:inherit;letter-spacing:.2px;transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.bp{background:var(--em);color:#fff}
.bg2{background:#fff;color:var(--ink2);border:2px solid var(--bd)}
.bd2{background:var(--rdp);color:var(--rd);border:1.5px solid #FECACA}
.bgold{background:var(--go);color:#fff}
.bs{padding:8px 13px;font-size:13px}

/* === TABLE === */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
table{width:100%;border-collapse:collapse;min-width:300px}
th{padding:12px 14px;text-align:left;font-size:11px;font-weight:900;color:var(--em);text-transform:uppercase;letter-spacing:.8px;background:linear-gradient(135deg,var(--em3),rgba(220,252,231,.5));border-bottom:3px solid var(--em);white-space:nowrap}
[dir=rtl] th{text-align:right}
td{padding:14px 14px;font-size:14px;font-weight:600;border-bottom:1px solid var(--cr2);color:var(--ink)}
tr:hover td{background:#FAFAF7}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(13,79,46,.025)}

/* === BADGES === */
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;display:inline-block;letter-spacing:.2px}
.bg3{background:#DCF5E7;color:#166534}.br2{background:var(--rdp);color:var(--rd)}
.bam{background:#FEF9E7;color:#92400E}.bgo{background:var(--gop);color:#78350F}
.bbl{background:var(--blp);color:var(--bl)}.bpu{background:#F5F3FF;color:var(--pu)}

/* === ATTENDANCE === */
.ar{padding:14px 16px;border-bottom:1px solid var(--cr2)}
.an{font-size:16px;font-weight:900;color:var(--ink);margin-bottom:10px}
.ab-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ab{padding:13px 4px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;border:2px solid transparent;text-align:center;touch-action:manipulation;width:100%;font-family:inherit;transition:all .15s}
.ab.pr{border-color:var(--em);color:var(--em);background:#fff}
.ab.pr.act{background:var(--em);color:#fff}
.ab.ab2{border-color:var(--rd);color:var(--rd);background:#fff}
.ab.ab2.act{background:var(--rd);color:#fff}
.ab.lt{border-color:var(--go);color:#92400E;background:#fff}
.ab.lt.act{background:var(--go);color:#fff}

/* === ACCOUNTING === */
.acs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;border-bottom:2px solid var(--cr2)}
.acb{text-align:center;background:var(--cr2);border-radius:var(--rs);padding:12px 6px}
.acv{font-size:18px;font-weight:800}.acl{font-size:11px;color:var(--ink3);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.gr{color:#166534}.rr{color:var(--rd)}.gor{color:#92400E}

/* === EVENTS === */
.ec{border-radius:var(--rs);padding:14px;background:#fff;border:1px solid var(--bd);border-left:5px solid var(--em);margin-bottom:10px}
.ec.sport{border-left-color:var(--bl)}.ec.cultural{border-left-color:var(--pu)}
.ec.outing{border-left-color:#0F766E}.ec.celebration{border-left-color:var(--go)}
[dir=rtl] .ec{border-left:1px solid var(--bd);border-right:5px solid var(--em)}
[dir=rtl] .ec.sport{border-right-color:var(--bl)}[dir=rtl] .ec.cultural{border-right-color:var(--pu)}
[dir=rtl] .ec.outing{border-right-color:#0F766E}[dir=rtl] .ec.celebration{border-right-color:var(--go)}
.en{font-size:15px;font-weight:800;color:var(--ink)}
.ed{font-size:13px;color:var(--ink3);margin-top:3px;font-weight:600}
.edes{font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.5}

/* === MODAL === */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.md{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.mh{padding:18px 20px;border-bottom:2px solid var(--cr2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mt2{font-size:18px;font-weight:800;color:var(--em)}
.mx{background:var(--cr2);border:none;font-size:18px;cursor:pointer;color:var(--ink2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.mb{padding:20px;display:flex;flex-direction:column;gap:15px}
.mf{padding:15px 20px;border-top:2px solid var(--cr2);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.4px}
.fi,.fs{border:2px solid var(--bd);border-radius:var(--rs);padding:12px 14px;font-size:15px;font-weight:500;color:var(--ink);outline:none;background:#fff;font-family:inherit;-webkit-appearance:none;width:100%;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--em);background:#fff}

/* === CONFIRM === */
.co{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px}
.cb{background:#fff;border-radius:var(--ra);padding:28px 24px;max-width:300px;width:100%;text-align:center;box-shadow:var(--sh2)}
.ci{font-size:40px;margin-bottom:12px}
.cm{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:20px;line-height:1.5}
.cbts{display:flex;gap:10px;justify-content:center}

/* === TOAST === */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--em);color:#fff;padding:12px 24px;border-radius:30px;font-weight:800;font-size:14px;z-index:4000;white-space:nowrap;box-shadow:var(--sh2);animation:ti .3s ease}
@keyframes ti{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* === MISC === */
.empty{text-align:center;padding:40px 18px;color:var(--ink3);font-size:15px;font-weight:600}
.ei{font-size:40px;margin-bottom:12px}
.pbar2{display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px;flex-wrap:wrap}

/* === INSTALL BANNERS === */
#ib{display:none;position:fixed;bottom:68px;left:0;right:0;z-index:1500;background:var(--em);color:#fff;padding:12px 16px;flex-direction:row;align-items:center;gap:10px}
#ib.show{display:flex}
.ib-t{font-size:14px;font-weight:700;flex:1}
.ib-b{background:var(--go);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer}
.ib-x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
#ih{display:none;position:fixed;bottom:68px;left:0;right:0;z-index:1500;background:var(--ink);color:#fff;padding:18px 20px 24px;border-radius:18px 18px 0 0}
#ih.show{display:block}
.ih-x{position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}

/* === SAFE AREA === */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .botnav{padding-bottom:env(safe-area-inset-bottom)}
  .page{padding-bottom:calc(86px + env(safe-area-inset-bottom))}
}


/* === DESKTOP LAYOUT === */
@media(min-width:768px){
  body{
    background:#2C2C2C;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  /* Conteneur central largeur fixe */
  #root{
    width:480px;
    min-width:480px;
    position:relative;
  }
  .page{
    width:480px;
    padding-left:14px;
    padding-right:14px;
  }
  .topbar{
    width:480px !important;
    left:50% !important;
    transform:translateX(-50%) !important;
    border-radius:0 0 8px 8px;
  }
  .botnav{
    width:480px !important;
    left:50% !important;
    transform:translateX(-50%) !important;
    border-radius:8px 8px 0 0;
  }
  .more-menu{
    width:480px !important;
    left:50% !important;
    transform:translateX(-50%) !important;
  }
}

@media(min-width:1200px){
  body{font-size:18px}

  .topbar{height:72px;padding:0 40px}
  .app-name{font-size:18px}

}

    localStorage.setItem(getYearKey("classes"),JSON.stringify(classes));
    localStorage.removeItem("classes");
    if(classes.length>0)attCls=String(classes[0].id);
  }
  if(data.students){
    students=data.students;
    localStorage.setItem(getYearKey("students"),JSON.stringify(students));
    localStorage.removeItem("students");
  }
  if(data.attendance&&!Array.isArray(data.attendance)){
    attendance=data.attendance;
    localStorage.setItem(getYearKey("attendance"),JSON.stringify(attendance));
    localStorage.removeItem("attendance");
  }
  if(data.sanctions){
    sanctions=data.sanctions;
    localStorage.setItem(getYearKey("sanctions"),JSON.stringify(sanctions));
    localStorage.removeItem("sanctions");
  }
  if(data.schoolYear){
    schoolYear=data.schoolYear;
    localStorage.setItem("schoolYear",schoolYear);
  }
  if(data.events){
    events=data.events;
    localStorage.setItem(getYearKey("events"),JSON.stringify(events));
    localStorage.removeItem("events");
  }
  if(data.transactions){
    transactions=data.transactions;
    localStorage.setItem(getYearKey("transactions"),JSON.stringify(transactions));
    localStorage.removeItem("transactions");
  }
}

function loadFromCloud(callback){
  if(!syncEnabled()){if(callback)callback(false);return;}
  var xhr=new XMLHttpRequest();
  xhr.open("GET",API_URL);
  xhr.setRequestHeader("X-API-Key",API_SECRET);
  xhr.onload=function(){
    try{
      var r=JSON.parse(xhr.responseText);
      if(r.success){
        if(r.data){
          // Only restore if no recent local changes (within last 10 seconds)
          var timeSinceChange=(Date.now()-_lastLocalChange)/1000;
          if(timeSinceChange>10){
            restoreData(r.data);
          }
        }
        if(callback)callback(true);
      } else {
        if(callback)callback(false);
      }
    }catch(e){if(callback)callback(false);}
  };
  xhr.onerror=function(){if(callback)callback(false);};
  xhr.send();
}

function saveToCloud(){
  if(!syncEnabled())return;
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(function(){
    // Remove duplicates from students
    var _seen={};var _cleanStu=[];
    for(var _i=0;_i<students.length;_i++){
      if(!_seen[students[_i].id]){_seen[students[_i].id]=true;_cleanStu.push(students[_i]);}
    }
    var freshData={
      users:users,
      classes:classes,
      students:_cleanStu,
      attendance:attendance,
      sanctions:sanctions,
      schoolYear:schoolYear,
      events:events,
      transactions:transactions,
      savedAt:new Date().toISOString()
    };
    var xhr=new XMLHttpRequest();
    xhr.open("POST",API_URL);
    xhr.setRequestHeader("Content-Type","application/json");
    xhr.setRequestHeader("X-API-Key",API_SECRET);
    xhr.onload=function(){
      var ind=document.getElementById("sync-ind");
      if(ind){
        try{
          var r=JSON.parse(xhr.responseText);
          ind.textContent=r.success?"\u2705 "+new Date().toLocaleTimeString():"\u274C Erreur";
          ind.style.color=r.success?"#E9C46A":"#C1440E";
        }catch(e){}
      }
    };
    xhr.onerror=function(){
      var ind=document.getElementById("sync-ind");
      if(ind){ind.textContent="\u274C Sync erreur";ind.style.color="#C1440E";}
    };
    xhr.send(JSON.stringify(freshData));
  },2000);
}

function tapAtt(key,sid){
  if(Array.isArray(attendance))attendance={};
  if(!attendance[key])attendance[key]={};
  var cur=attendance[key][sid]||"";
  if(cur===""){attendance[key][sid]="absent";}
  else if(cur==="absent"){attendance[key][sid]="present";}
  else if(cur==="present"){attendance[key][sid]="absent_just";}
  else if(cur==="absent_just"){attendance[key][sid]="late";}
  else{delete attendance[key][sid];}
  sv(getYearKey("attendance"),attendance);
  saveToCloud();
  // Update card visual
  var card=document.getElementById("atc_"+sid);
  if(card){
    var nst=attendance[key][sid]||"";
    var icons={"present":"\u2714","absent":"\u2716","absent_just":"\u2713","late":"\u23F0"};
    card.className="att-card"+(nst?" "+nst:"");
    var badge=card.querySelector(".att-badge");
    if(badge)badge.textContent=nst?icons[nst]:"";
  }
  // Update counters in real time
  updateAttCounters(key);
}

function updateAttCounters(key){
  var rec=attendance[key]||{};
  var nPr=0,nAb=0,nJt=0,nLa=0;
  var sids=Object.keys(rec);
  for(var i=0;i<sids.length;i++){
    var v=rec[sids[i]];
    if(v==="present")nPr++;
    else if(v==="absent")nAb++;
    else if(v==="absent_just")nJt++;
    else if(v==="late")nLa++;
  }
  var elPr=document.querySelector(".att-sum-n.pr .n");
  var elAb=document.querySelector(".att-sum-n.ab .n");
  var elJt=document.querySelector(".att-sum-n.jt .n");
  var elLa=document.querySelector(".att-sum-n.la .n");
  if(elPr)elPr.textContent=nPr;
  if(elAb)elAb.textContent=nAb;
  if(elJt)elJt.textContent=nJt;
  if(elLa)elLa.textContent=nLa;
}

// Store pending new year during student selection
var pendingNewYear="";
var selectedStudentsForNewYear=[];

function createNewYear(){
  var y=document.getElementById("f_year");
  if(!y||!y.value)return;
  var ny=y.value.trim();
  if(!ny)return;
  // If year already exists just switch
  if(schoolYears.indexOf(ny)>=0){switchYear(ny);return;}
  // Open student selection modal
  pendingNewYear=ny;
  selectedStudentsForNewYear=students.map(function(s){return s.id});
  modal={type:"newYearStudents"};render();
}

function toggleStudentForYear(id){
  var idx=selectedStudentsForNewYear.indexOf(id);
  if(idx>=0){selectedStudentsForNewYear.splice(idx,1);}
  else{selectedStudentsForNewYear.push(id);}
  render();
}

function confirmNewYear(){
  var ny=pendingNewYear;
  if(!ny)return;
  if(schoolYears.indexOf(ny)<0){schoolYears.push(ny);sv("schoolYears",schoolYears);}
  // Copy only selected students to new year
  var newStudents=students.filter(function(s){return selectedStudentsForNewYear.indexOf(s.id)>=0;});
  // Switch to new year
  var prevYear=schoolYear;
  schoolYear=ny;
  sv("schoolYear",schoolYear);
  sv(getYearKey("students"),newStudents);
  students=newStudents;
  attendance=ld(getYearKey("attendance"),{});
  transactions=ld(getYearKey("transactions"),[]);
  events=ld(getYearKey("events"),[]);
  pendingNewYear="";
  selectedStudentsForNewYear=[];
  modal=null;
  render();
}
function doSwitchYear(btn){switchYear(btn.getAttribute("data-yr"));}
function switchYear(y){
  schoolYear=y;
  sv("schoolYear",schoolYear);
  attendance=ld(getYearKey("attendance"),{});
  transactions=ld(getYearKey("transactions"),[]);
  events=ld(getYearKey("events"),[]);
  students=ld(getYearKey("students"),[]);
  modal=null;render();
}

function saveChPw(userId){
  var t=tl().usr;
  var old_pw=document.getElementById("pw_old").value;
  var new_pw=document.getElementById("pw_new").value;
  var conf_pw=document.getElementById("pw_conf").value;
  var err=document.getElementById("pw_err");
  var isAdmin=(currentUser&&currentUser.role==="admin");
  // Find target user
  var cu=null;
  for(var i=0;i<users.length;i++){if(users[i].id===userId)cu=users[i];}
  if(!cu){err.textContent="Erreur utilisateur";return;}
  // Check old password (skip for admin)
  if(!isAdmin&&cu.password!==old_pw&&old_pw!=="1234"){
    err.textContent=t.pwwrong;return;
  }
  if(new_pw!==conf_pw){err.textContent=t.pwmatch;return;}
  if(!new_pw){err.textContent=(lang==="ar"?"\u0643\u0644\u0645\u0629 \u0627\u0644\u0633\u0631 \u0641\u0627\u0631\u063a\u0629":"Mot de passe vide");return;}
  cu.password=new_pw;
  if(currentUser&&currentUser.id===userId)currentUser.password=new_pw;
  sv(getYearKey("users"),users);
  sv("currentUser",currentUser);
  modal=null;showToast(t.pwok);render();
}

function pageSynth(){
  var t=tl();var sy=t.synth;
  var TABS=3;var TSANC=3;
  var stats={};
  for(var i=0;i<students.length;i++){
    if(students[i].status==="active")stats[students[i].id]={s:students[i],ab:0,la:0,sc:0};
  }
  var akeys=Object.keys(attendance);
  for(var k=0;k<akeys.length;k++){
    var rec=attendance[akeys[k]];
    var sids=Object.keys(rec);
    for(var i=0;i<sids.length;i++){
      var sid=Number(sids[i]);
      if(stats[sid]){if(rec[sid]==="absent")stats[sid].ab++;if(rec[sid]==="late")stats[sid].la++;}
    }
  }
  for(var i=0;i<sanctions.length;i++){if(stats[sanctions[i].studentId])stats[sanctions[i].studentId].sc++;}
  var list=[];var _vkeys=Object.keys(stats);for(var _vi=0;_vi<_vkeys.length;_vi++){list.push(stats[_vkeys[_vi]]);}
  list.sort(function(a,b){
    var sa=(a.ab>=TABS?2:0)+(a.sc>=TSANC?2:0);
    var sb=(b.ab>=TABS?2:0)+(b.sc>=TSANC?2:0);
    return sb!==sa?sb-sa:(b.ab+b.sc)-(a.ab+a.sc);
  });
  var lbAbs=lang==="ar"?"\u062d\u062f \u0627\u0644\u063a\u064a\u0627\u0628\u0627\u062a":"Seuil absences";
  var lbSanc=lang==="ar"?"\u062d\u062f \u0627\u0644\u0639\u0642\u0648\u0628\u0627\u062a":"Seuil sanctions";
  var h='<div class="card"><div class="ch"><span class="ct">&#128202; '+sy.title+'</span></div><div style="padding:12px 14px">';
  h+='<div style="background:#F0EDE6;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#6B6B8A">&#128680; '+lbAbs+': <strong>'+TABS+'</strong> &nbsp;|&nbsp; &#9888; '+lbSanc+': <strong>'+TSANC+'</strong></div>';
  if(list.length===0){h+='<div class="empty">'+sy.noAlert+'</div>';}
  else{
    for(var i=0;i<list.length;i++){
      var st=list[i];var s2=st.s;
      var aba=st.ab>=TABS;var sca=st.sc>=TSANC;var both=aba&&sca;
      var cc="synth-card"+(both?" al-both":sca?" al-sanc":aba?" al-abs":"");
      var cl=null;for(var j=0;j<classes.length;j++){if(classes[j].id===s2.classId){cl=classes[j];break;}}
      h+='<div class="'+cc+'">';
      h+='<div class="synth-avatar">&#128100;</div>';
      h+='<div class="synth-info">';
      h+='<div class="synth-name">'+esc(s2.name)+'</div>';
      h+='<div class="synth-cls">'+(cl?esc(cl.name):"")+'</div>';
      h+='<div class="synth-stats"><span class="ss ss-ab">&#128203; '+st.ab+' '+sy.abs+'</span>';
      if(st.la>0)h+='<span class="ss ss-la">&#9201; '+st.la+' '+sy.lat+'</span>';
      h+='<span class="ss ss-sa">&#9888; '+st.sc+' '+sy.sanc+'</span></div>';
      if(both)h+='<div class="synth-badge sb-both">&#128680; '+sy.alertBoth+'</div>';
      else if(sca)h+='<div class="synth-badge sb-sa">&#9888; '+sy.alertSanc+'</div>';
      else if(aba)h+='<div class="synth-badge sb-ab">&#9888; '+sy.alertAbs+'</div>';
      h+='</div>';
      if(aba||sca){h+='<div><button class="btn bp bs" onclick="addSanctForStu('+s2.id+',\''+esc(s2.name)+'\')">+&#9888;</button></div>';}
      h+='</div>';
    }
  }
  h+='</div></div>';
  return h;
}

function gotoSynth(){goto('synth');moreOpen=false;render();}
function addSanctForStu(sid,sname){mdata={studentId:sid,studentName:sname};modal={type:"addDisc"};render();}

function forceSyncUp(){
  var ind=document.getElementById("sync-ind");
  if(ind){ind.textContent="\u23F3";ind.style.color="#E9C46A";}
  var freshData={
    users:users,
    classes:classes,
    students:students,
    attendance:attendance,
    sanctions:sanctions,
    schoolYear:schoolYear,
    events:events,
    transactions:transactions,
    savedAt:new Date().toISOString()
  };
  var xhr=new XMLHttpRequest();
  xhr.open("POST",API_URL);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.setRequestHeader("X-API-Key",API_SECRET);
  xhr.onload=function(){
    try{
      var r=JSON.parse(xhr.responseText);
      if(ind){ind.textContent=r.success?"\u2705":"\u274C";ind.style.color=r.success?"#E9C46A":"#C1440E";}
      showToast(r.success?"\u2705 Donnees envoyees !":"\u274C Erreur envoi");
    }catch(e){}
  };
  xhr.onerror=function(){showToast("\u274C Erreur connexion");};
  xhr.send(JSON.stringify(freshData));
}

function forceSyncDown(){
  var ind=document.getElementById("sync-ind");
  if(ind){ind.textContent="\u23F3";ind.style.color="#E9C46A";}
  loadFromCloud(function(ok){
    if(ok){
      if(classes.length>0)attCls=String(classes[0].id);
      page="dashboard";
      render();
      showToast("\u2705 Donnees recues du serveur !");
    } else {
      if(ind){ind.textContent="\u2601\ufe0f";ind.style.color="rgba(255,255,255,.5)";}
      showToast("\u26A0 Aucune donnee sur le serveur");
    }
  });
}
function pSec(btn){
  printSection(btn.getAttribute("data-pt")||"");
}
function printSection(type){
  var t=tl();
  var now=new Date().toLocaleDateString(lang==="ar"?"ar-MA":"fr-FR",{day:"2-digit",month:"long",year:"numeric"});
  var content="";
  if(type==="discipline"){
    var t2=tl();var d=t2.disc;
    content="<h2>"+d.title+"</h2><p>"+t2.pr.on+" : "+now+"</p>";
    // Alerts
    var stuAbs2={};
    var akeys=Object.keys(attendance);
    for(var k=0;k<akeys.length;k++){var rec2=attendance[akeys[k]];var ss=Object.keys(rec2);for(var i=0;i<ss.length;i++){if(rec2[ss[i]]==="absent")stuAbs2[ss[i]]=(stuAbs2[ss[i]]||0)+1;}}
    var alertStu2=students.filter(function(s){return(stuAbs2[s.id]||0)>=3;});
    if(alertStu2.length>0){
      content+="<h3 style='color:#C1440E;margin-top:16px'>Alertes absences (3+)</h3>";
      content+="<table border='1' cellpadding='8' style='width:100%;border-collapse:collapse'><thead style='background:#C1440E;color:white'><tr><th>Eleve</th><th>Classe</th><th>Absences</th></tr></thead><tbody>";
      for(var i=0;i<alertStu2.length;i++){var s2=alertStu2[i];var cl2=null;for(var j=0;j<classes.length;j++){if(classes[j].id===s2.classId){cl2=classes[j];break;}}content+="<tr><td>"+s2.name+"</td><td>"+(cl2?cl2.name:"")+"</td><td style='color:red;text-align:center'>"+(stuAbs2[s2.id]||0)+"</td></tr>";}
      content+="</tbody></table>";
    }
    content+="<h3 style='color:#1B4332;margin-top:16px'>Sanctions</h3>";
    content+="<table border='1' cellpadding='8' style='width:100%;border-collapse:collapse'><thead style='background:#1B4332;color:white'><tr><th>Eleve</th><th>Type</th><th>Date</th><th>Statut</th><th>Motif</th></tr></thead><tbody>";
    for(var i=0;i<sanctions.length;i++){var sc2=sanctions[i];content+="<tr><td>"+sc2.studentName+"</td><td>"+(d.types[sc2.type]||sc2.type)+"</td><td>"+formatDate(sc2.date)+"</td><td>"+(d.statuses[sc2.status]||sc2.status)+"</td><td>"+sc2.desc+"</td></tr>";}
    content+="</tbody></table>";
  }
  if(type==="students"){
    content="<h2>"+t.stu.title+"</h2><p>"+t.pr.on+" : "+now+"</p><table border='1' cellpadding='8' style='width:100%;border-collapse:collapse;margin-top:14px'><thead style='background:#1B4332;color:white'><tr><th>"+t.stu.name+"</th><th>"+t.stu.age+"</th><th>"+t.stu.cls+"</th><th>"+t.stu.pho+"</th></tr></thead><tbody>";
    for(var i=0;i<students.length;i++){var s=students[i];var cl=null;for(var j=0;j<classes.length;j++){if(classes[j].id===s.classId){cl=classes[j];break;}}content+="<tr><td>"+s.name+"</td><td>"+s.age+"</td><td>"+(cl?cl.name:"")+"</td><td>"+s.phone+"</td></tr>";}
    content+="</tbody></table>";
  }else if(type==="absences"){
    content="<h2>"+t.att.rep+"</h2><p>"+t.pr.on+" : "+now+"</p><table border='1' cellpadding='8' style='width:100%;border-collapse:collapse;margin-top:14px'><thead style='background:#1B4332;color:white'><tr><th>"+t.att.stu+"</th><th>"+t.stu.cls+"</th><th>"+t.att.abs+"</th><th>"+t.att.lat+"</th></tr></thead><tbody>";
    for(var i=0;i<students.length;i++){var s=students[i];if(s.status!=="active")continue;var cl=null;for(var j=0;j<classes.length;j++){if(classes[j].id===s.classId){cl=classes[j];break;}}var ab=0,la=0;var keys=Object.keys(attendance);for(var k=0;k<keys.length;k++){var r=attendance[keys[k]];if(r[s.id]==="absent")ab++;if(r[s.id]==="late")la++;}content+="<tr><td>"+s.name+"</td><td>"+(cl?cl.name:"")+"</td><td style='text-align:center'>"+ab+"</td><td style='text-align:center'>"+la+"</td></tr>";}
    content+="</tbody></table>";
  }else if(type==="accounting"){
    var inc=0,exp=0;for(var i=0;i<transactions.length;i++){if(transactions[i].type==="income")inc+=Number(transactions[i].amount);else exp+=Number(transactions[i].amount);}
    content="<h2>"+t.acc.title+"</h2><p>"+t.pr.on+" : "+now+"</p><p><strong>"+t.acc.inc+":</strong> "+inc+"  |  <strong>"+t.acc.exp+":</strong> "+exp+"  |  <strong>"+t.acc.bal+":</strong> "+(inc-exp)+"</p><table border='1' cellpadding='8' style='width:100%;border-collapse:collapse;margin-top:14px'><thead style='background:#1B4332;color:white'><tr><th>"+t.acc.dat+"</th><th>"+t.acc.des+"</th><th>"+t.acc.cat+"</th><th>"+t.acc.amt+"</th></tr></thead><tbody>";
    for(var i=0;i<transactions.length;i++){var tx=transactions[i];content+="<tr><td>"+formatDate(tx.date)+"</td><td>"+tx.description+"</td><td>"+(t.acc.cats[tx.category]||tx.category)+"</td><td style='color:"+(tx.type==="income"?"green":"red")+"'>"+(tx.type==="income"?"+":"-")+tx.amount+"</td></tr>";}
    content+="</tbody></table>";
  }
  var w=window.open("","_blank");
  if(!w){alert("Autorisez les popups");return;}
  w.document.write("<!DOCTYPE html><html dir='"+t.dir+"'><head><meta charset='UTF-8'><title>"+t.app+"</title><style>body{font-family:Arial,sans-serif;padding:20px;direction:"+t.dir+"}h1{color:#1B4332;border-bottom:3px solid #C8963C;padding-bottom:10px}@media print{button{display:none}}</style></head><body><h1>"+t.app+"</h1>"+content+"<br><button onclick='window.print()' style='background:#1B4332;color:white;padding:10px 22px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-top:16px'>Imprimer</button></body></html>");
  w.document.close();
}
