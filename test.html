<!DOCTYPE html>
<html>
<head><title>Test API AlKhayr</title></head>
<body>
<h2>Test connexion API</h2>
<button onclick="testAPI()">Tester l'API</button>
<pre id="result" style="background:#f0f0f0;padding:20px;margin-top:20px"></pre>

<script>
function testAPI(){
  document.getElementById('result').textContent = 'Test en cours...';
  
  fetch('https://netplaned.fr/alkhayr/api.php', {
    method: 'GET',
    headers: {
      'X-API-Key': 'AlKhayrApp1970Secret!',
      'Content-Type': 'application/json'
    }
  })
  .then(function(r){ 
    document.getElementById('result').textContent += '\nStatus: ' + r.status;
    return r.json(); 
  })
  .then(function(d){ 
    document.getElementById('result').textContent += '\nRéponse: ' + JSON.stringify(d, null, 2);
  })
  .catch(function(e){ 
    document.getElementById('result').textContent += '\nERREUR: ' + e.message;
  });
}
</script>
</body>
</html>
